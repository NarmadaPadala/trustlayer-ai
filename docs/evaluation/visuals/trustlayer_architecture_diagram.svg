<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-label="TrustLayer AI architecture diagram">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 17px Arial, sans-serif; fill: #475569; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 8; }
      .agent { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 8; }
      .eval { fill: #ecfdf5; stroke: #059669; stroke-width: 2; rx: 8; }
      .obs { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 8; }
      .text { font: 700 17px Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 14px Arial, sans-serif; fill: #334155; }
      .arrow { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #ea580c; stroke-width: 2.2; fill: none; stroke-dasharray: 7 6; marker-end: url(#arrow-orange); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#ea580c"/>
    </marker>
  </defs>

  <rect class="bg" width="1400" height="900"/>
  <text x="70" y="70" class="title">TrustLayer AI Evaluation Architecture</text>
  <text x="70" y="102" class="subtitle">Multi-agent Python code review with golden dataset evaluation, LangSmith-ready observability, and human-review escalation.</text>

  <rect x="80" y="160" width="230" height="85" class="box"/>
  <text x="105" y="195" class="text">Developer Input</text>
  <text x="105" y="220" class="small">Python file or pasted code</text>

  <rect x="370" y="160" width="230" height="85" class="box"/>
  <text x="395" y="195" class="text">Streamlit UI</text>
  <text x="395" y="220" class="small">Upload, paste, review</text>

  <rect x="660" y="160" width="250" height="85" class="box"/>
  <text x="685" y="195" class="text">Input Validation</text>
  <text x="685" y="220" class="small">type, size, empty, binary</text>

  <rect x="970" y="160" width="260" height="85" class="agent"/>
  <text x="995" y="195" class="text">LangGraph Orchestrator</text>
  <text x="995" y="220" class="small">controls review workflow</text>

  <rect x="160" y="340" width="310" height="130" class="agent"/>
  <text x="190" y="374" class="text">Security Review Agent</text>
  <text x="190" y="402" class="small">secrets, SQL injection, eval</text>
  <text x="190" y="426" class="small">path traversal, pickle/yaml</text>
  <text x="190" y="450" class="small">command injection, weak randomness</text>

  <rect x="545" y="340" width="310" height="130" class="agent"/>
  <text x="575" y="374" class="text">Reliability Review Agent</text>
  <text x="575" y="402" class="small">timeouts, retries, exceptions</text>
  <text x="575" y="426" class="small">input validation, JSON parsing</text>
  <text x="575" y="450" class="small">database and file handling</text>

  <rect x="930" y="340" width="310" height="130" class="agent"/>
  <text x="960" y="374" class="text">Test Coverage Agent</text>
  <text x="960" y="402" class="small">unit tests, integration tests</text>
  <text x="960" y="426" class="small">negative tests, edge cases</text>
  <text x="960" y="450" class="small">UAT and UI test guidance</text>

  <rect x="245" y="570" width="250" height="100" class="box"/>
  <text x="275" y="608" class="text">Aggregate Findings</text>
  <text x="275" y="634" class="small">merge structured outputs</text>

  <rect x="575" y="570" width="250" height="100" class="box"/>
  <text x="605" y="608" class="text">Risk Scoring</text>
  <text x="605" y="634" class="small">Low / Medium / High / Critical</text>

  <rect x="905" y="570" width="260" height="100" class="box"/>
  <text x="935" y="608" class="text">Human Review Rule</text>
  <text x="935" y="634" class="small">Critical -> review required</text>

  <rect x="575" y="735" width="270" height="95" class="box"/>
  <text x="605" y="772" class="text">Final Review Report</text>
  <text x="605" y="798" class="small">findings, evidence, next steps</text>

  <rect x="80" y="725" width="330" height="105" class="eval"/>
  <text x="110" y="763" class="text">40-Case Golden Dataset</text>
  <text x="110" y="789" class="small">20 happy, 12 edge, 6 known failure</text>
  <text x="110" y="813" class="small">2 adversarial cases</text>

  <rect x="980" y="725" width="330" height="105" class="obs"/>
  <text x="1010" y="763" class="text">LangSmith Observability</text>
  <text x="1010" y="789" class="small">workflow spans, agent spans</text>
  <text x="1010" y="813" class="small">latency, metadata, token/cost</text>

  <path class="arrow" d="M310 202 L370 202"/>
  <path class="arrow" d="M600 202 L660 202"/>
  <path class="arrow" d="M910 202 L970 202"/>
  <path class="arrow" d="M1100 245 C1100 300 315 290 315 340"/>
  <path class="arrow" d="M470 405 L545 405"/>
  <path class="arrow" d="M855 405 L930 405"/>
  <path class="arrow" d="M1085 470 C1085 535 370 515 370 570"/>
  <path class="arrow" d="M495 620 L575 620"/>
  <path class="arrow" d="M825 620 L905 620"/>
  <path class="arrow" d="M1035 670 C1035 720 710 690 710 735"/>
  <path class="arrow" d="M245 725 C245 650 220 540 300 470"/>
  <path class="dash" d="M1100 245 C1260 350 1245 620 1145 725"/>
  <path class="dash" d="M315 470 C440 520 835 520 1050 725"/>
  <path class="dash" d="M700 470 C760 560 930 640 1030 725"/>
</svg>
